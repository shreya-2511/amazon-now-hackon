name: Deploy App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 3.88.127.234
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Enter the project frontend folder
          cd /home/ubuntu/projects/frontend

          # 2. Force pull the clean code to overwrite permissions locks
          git fetch --all
          git reset --hard origin/main

          # 3. Clean install your dependencies and build without using sudo
          npx pnpm install --no-frozen-lockfile
          npx pnpm exec next build

          # 4. Kill old server instance and launch the updated version live
          pkill -f "next-server" || true
          nohup npx pnpm exec next start -p 3100 > next.log 2>&1 &
