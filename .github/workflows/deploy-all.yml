name: Deploy App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 3.88.127.234
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Navigate to the root folder and sync the latest code
          cd /home/ubuntu/amazon-now-hackon
          git fetch --all
          git reset --hard origin/main

          # ==========================================
          # BACKEND & CATALOG DEPLOYMENT (Phases 1-3)
          # ==========================================
          
          # Install 'uv' if it isn't already installed on the machine
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"

          # Initialize virtual environment and sync backend dependencies
          uv venv --allow-existing
          uv sync

          # Run the required data content pipelines to generate catalogs
          uv run scripts/build_catalog.py
          uv run scripts/build_recipes.py

          # Kill any old background API processes and launch Uvicorn on port 8010
          pkill -f "uvicorn" || true
          nohup uv run uvicorn backend.app.main:app --host 0.0.0.0 --port 8010 > uvicorn.log 2>&1 &


          # ==========================================
          # FRONTEND DEPLOYMENT (Phase 4)
          # ==========================================
          
          cd frontend

          # Clean install frontend dependencies using npx to avoid global locks
          npx pnpm install --no-frozen-lockfile
          
          # Compile the Next.js production build
          npx pnpm exec next build

          # Kill old frontend server processes and launch fresh on production Port 3100
          pkill -f "next-server" || true
          nohup npx pnpm exec next start -p 3100 > next.log 2>&1 &
