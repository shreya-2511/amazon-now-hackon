name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/amazonNow

            git fetch origin main
            git reset --hard origin/main

            # Migrate deduplicated catalog to DynamoDB
            python3 -c "import boto3" 2>/dev/null || pip3 install boto3 python-dotenv --user
            AWS_REGION=ap-south-1 PRODUCTS_TABLE_NAME=products USERS_TABLE_NAME=user_profiles \
              python3 scripts/migrate_to_dynamodb.py

            cd frontend
            pnpm install
            pnpm build

            sudo systemctl restart amznow-api
            sudo systemctl restart amznow-web
